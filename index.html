<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>近くの図書館を探す</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg1: #1e3a5f;
      --bg2: #2d6a4f;
      --accent: #3b82f6;
      --accent-dk: #1d4ed8;
      --card-bg: rgba(255,255,255,0.12);
      --card-border: rgba(255,255,255,0.25);
      --text: #fff;
      --text-muted: rgba(255,255,255,0.65);
      --radius: 16px;
      --font: 'Noto Sans JP', sans-serif;
    }

    body {
      min-height: 100vh;
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
    }

    /* ===== HEADER ===== */
    header {
      padding: 24px 32px 0;
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    header p {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ===== API KEY PANEL ===== */
    #api-key-panel {
      max-width: 560px;
      margin: 24px auto 0;
      padding: 24px 28px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: 0 16px 48px rgba(0,0,0,0.25);
    }

    #api-key-panel label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    #appkey-input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: #fff;
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #appkey-input::placeholder { color: rgba(255,255,255,0.35); }
    #appkey-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.18);
    }

    #search-btn {
      padding: 12px 22px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }
    #search-btn:hover:not(:disabled) { background: var(--accent-dk); }
    #search-btn:active:not(:disabled) { transform: scale(0.97); }
    #search-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    #key-hint {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    #key-hint a { color: #93c5fd; }

    /* ===== LOADING OVERLAY ===== */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
    }
    #loading-overlay p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(59,130,246,0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== ERROR BANNER ===== */
    #error-banner {
      max-width: 560px;
      margin: 14px auto 0;
      padding: 14px 20px;
      background: rgba(239,68,68,0.25);
      border: 1px solid rgba(239,68,68,0.5);
      border-radius: 10px;
      font-size: 0.88rem;
      color: #fca5a5;
      text-align: center;
    }

    /* ===== MAIN CONTENT ===== */
    #main-content {
      margin-top: 24px;
    }

    /* Desktop: map left (sticky), list right */
    @media (min-width: 768px) {
      #main-content {
        display: grid;
        grid-template-columns: 1fr 420px;
        height: calc(100vh - 180px);
        min-height: 500px;
      }
      #map-section {
        position: sticky;
        top: 0;
        height: calc(100vh - 180px);
      }
      #list-section {
        overflow-y: auto;
        padding: 16px 16px 32px;
      }
    }

    /* Mobile: map on top, list below */
    @media (max-width: 767px) {
      #main-content { display: flex; flex-direction: column; }
      #map-section { flex-shrink: 0; }
      #list-section { padding: 12px 12px 32px; }
    }

    #map {
      width: 100%;
      height: 100%;
    }
    @media (max-width: 767px) {
      #map { height: 300px; }
    }

    /* ===== RESULT COUNT ===== */
    #result-count {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      padding: 8px 4px 12px;
    }

    /* ===== LIBRARY CARDS ===== */
    #library-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .library-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      animation: fadeIn 0.35s ease forwards;
    }
    .library-card:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
    }
    .library-card.is-active {
      border-color: var(--accent);
      background: rgba(59,130,246,0.18);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .category-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .cat-small   { background: rgba(100,116,139,0.35); color: #cbd5e1; }
    .cat-medium  { background: rgba(59,130,246,0.35);  color: #93c5fd; }
    .cat-large   { background: rgba(79,70,229,0.35);   color: #a5b4fc; }
    .cat-univ    { background: rgba(217,119,6,0.35);   color: #fcd34d; }
    .cat-special { background: rgba(5,150,105,0.35);   color: #6ee7b7; }
    .cat-bm      { background: rgba(220,38,38,0.35);   color: #fca5a5; }

    .distance-badge {
      font-size: 0.78rem;
      font-weight: 700;
      color: #93c5fd;
      white-space: nowrap;
      margin-left: auto;
    }

    .library-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
      overflow-wrap: break-word;
    }

    .library-formal {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .library-address,
    .library-tel {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card-actions {
      margin-top: 12px;
    }

    .btn-website {
      display: inline-block;
      padding: 7px 14px;
      background: rgba(59,130,246,0.25);
      border: 1px solid rgba(59,130,246,0.4);
      border-radius: 8px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn-website:hover {
      background: rgba(59,130,246,0.45);
    }

    /* ===== "YOU ARE HERE" MARKER ===== */
    .you-marker {
      width: 18px;
      height: 18px;
      background: #3b82f6;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.35);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(59,130,246,0.35); }
      50%       { box-shadow: 0 0 0 8px rgba(59,130,246,0.12); }
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 近くの図書館を探す</h1>
    <p>Calil APIで現在地から近い図書館を検索します</p>
  </header>

  <section id="api-key-panel">
    <label for="appkey-input">Calil APIキー</label>
    <div class="input-row">
      <input id="appkey-input" type="text" placeholder="APIキーを入力してください">
      <button id="search-btn">現在地で検索</button>
    </div>
    <p id="key-hint">
      APIキーは <a href="https://calil.jp/api/dashboard/" target="_blank" rel="noopener">Calil開発者ページ</a>で無料取得できます。
    </p>
  </section>

  <div id="error-banner" hidden role="alert"></div>

  <div id="loading-overlay" hidden>
    <div class="spinner"></div>
    <p id="loading-msg">位置情報を取得中…</p>
  </div>

  <main id="main-content" hidden>
    <section id="map-section">
      <div id="map"></div>
    </section>
    <section id="list-section">
      <h2 id="result-count"></h2>
      <ul id="library-list"></ul>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const CATEGORY_LABEL = {
      SMALL:   { ja: '小規模図書館', cls: 'cat-small' },
      MEDIUM:  { ja: '図書館',       cls: 'cat-medium' },
      LARGE:   { ja: '大規模図書館', cls: 'cat-large' },
      UNIV:    { ja: '大学図書館',   cls: 'cat-univ' },
      SPECIAL: { ja: '専門図書館',   cls: 'cat-special' },
      BM:      { ja: '移動図書館',   cls: 'cat-bm' }
    };

    const state = {
      appkey: '',
      userLat: null,
      userLng: null,
      libraries: [],
      map: null,
      markers: [],
      userMarker: null
    };

    // ---- Geolocation ----
    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('お使いのブラウザは位置情報に対応していません。'));
          return;
        }
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          err => {
            const msgs = {
              1: '位置情報の使用が拒否されました。ブラウザの設定をご確認ください。',
              2: '位置情報を取得できませんでした。',
              3: '位置情報の取得がタイムアウトしました。'
            };
            reject(new Error(msgs[err.code] || '位置情報の取得に失敗しました。'));
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    // ---- JSONP call to Calil API ----
    // Calil geocode param is "lng,lat" order
    function fetchLibraries(appkey, lat, lng) {
      return new Promise((resolve, reject) => {
        const cbName  = 'calilCb_' + Date.now();
        const scriptId = 'calil-script-' + Date.now();
        let tid;

        window[cbName] = function(data) {
          clearTimeout(tid);
          cleanup();
          if (!Array.isArray(data) || data.length === 0) {
            reject(new Error('近くに図書館が見つかりませんでした。'));
            return;
          }
          resolve(data);
        };

        function cleanup() {
          delete window[cbName];
          const el = document.getElementById(scriptId);
          if (el) el.remove();
        }

        const url = 'https://api.calil.jp/library'
                  + '?appkey=' + encodeURIComponent(appkey)
                  + '&geocode=' + encodeURIComponent(lng + ',' + lat)
                  + '&limit=20'
                  + '&callback=' + cbName;

        const script = document.createElement('script');
        script.id  = scriptId;
        script.src = url;
        script.onerror = () => {
          clearTimeout(tid);
          cleanup();
          reject(new Error('APIリクエストに失敗しました。APIキーをご確認ください。'));
        };

        tid = setTimeout(() => {
          cleanup();
          reject(new Error('APIのレスポンスがタイムアウトしました。'));
        }, 12000);

        document.head.appendChild(script);
      });
    }

    // ---- Leaflet map ----
    function initMap(lat, lng) {
      if (state.map) {
        state.map.remove();
        state.markers = [];
        state.userMarker = null;
      }

      state.map = L.map('map').setView([lat, lng], 13);

      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
      }).addTo(state.map);

      const youIcon = L.divIcon({
        className: '',
        html: '<div class="you-marker"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
      state.userMarker = L.marker([lat, lng], { icon: youIcon })
        .bindPopup('<b>現在地</b>')
        .addTo(state.map);
    }

    function renderMarkers(libraries) {
      const bounds = [[state.userLat, state.userLng]];

      libraries.forEach((lib, i) => {
        if (!lib.geocode) return;
        // Calil geocode field is "lng,lat"
        const parts = lib.geocode.split(',').map(Number);
        if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return;
        const mlng = parts[0], mlat = parts[1];

        const marker = L.marker([mlat, mlng])
          .bindPopup(
            '<b>' + (lib.short || lib.formal || '') + '</b>' +
            (lib.address ? '<br>' + lib.address : '') +
            (lib.distance != null ? '<br>' + lib.distance + ' km' : '')
          )
          .addTo(state.map);

        marker.on('click', () => highlightCard(i));
        state.markers.push(marker);
        bounds.push([mlat, mlng]);
      });

      if (bounds.length > 1) {
        state.map.fitBounds(bounds, { padding: [40, 40] });
      }
    }

    function renderCards(libraries) {
      const list = document.getElementById('library-list');
      list.innerHTML = '';

      document.getElementById('result-count').textContent =
        libraries.length + '件の図書館が見つかりました';

      libraries.forEach((lib, i) => {
        const cat  = CATEGORY_LABEL[lib.category] || { ja: lib.category || '図書館', cls: 'cat-medium' };
        const dist = lib.distance != null ? lib.distance + ' km' : '—';
        const name = lib.short || lib.formal || lib.systemid || '(名称不明)';
        const formalDiff = lib.formal && lib.formal !== lib.short
          ? '<p class="library-formal">' + lib.formal + '</p>' : '';
        const addr = lib.address
          ? '<p class="library-address">📍 ' + lib.address + '</p>' : '';
        const tel  = lib.tel
          ? '<p class="library-tel">📞 ' + lib.tel + '</p>' : '';
        const web  = lib.url_pc
          ? '<a href="' + lib.url_pc + '" target="_blank" rel="noopener" class="btn-website" onclick="event.stopPropagation()">ウェブサイト →</a>' : '';

        const li = document.createElement('li');
        li.className = 'library-card';
        li.dataset.index = i;
        li.style.animationDelay = (i * 0.03) + 's';
        li.innerHTML =
          '<div class="card-header">' +
            '<span class="category-badge ' + cat.cls + '">' + cat.ja + '</span>' +
            '<span class="distance-badge">' + dist + '</span>' +
          '</div>' +
          '<h3 class="library-name">' + name + '</h3>' +
          formalDiff + addr + tel +
          (web ? '<div class="card-actions">' + web + '</div>' : '');

        li.addEventListener('click', () => {
          const marker = state.markers[i];
          if (marker) {
            state.map.setView(marker.getLatLng(), 15, { animate: true });
            marker.openPopup();
          }
          highlightCard(i);
        });

        list.appendChild(li);
      });
    }

    function highlightCard(index) {
      document.querySelectorAll('.library-card').forEach((c, i) => {
        c.classList.toggle('is-active', i === index);
      });
      const active = document.querySelector('.library-card.is-active');
      if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.hidden = false;
      clearTimeout(showError._tid);
      showError._tid = setTimeout(() => { el.hidden = true; }, 8000);
    }

    function setLoading(active, msg) {
      document.getElementById('loading-overlay').hidden = !active;
      document.getElementById('search-btn').disabled = active;
      if (msg) document.getElementById('loading-msg').textContent = msg;
    }

    // ---- Main ----
    async function onSearch() {
      const appkey = document.getElementById('appkey-input').value.trim();
      if (!appkey) {
        showError('APIキーを入力してください。');
        return;
      }

      try { localStorage.setItem('calil_appkey', appkey); } catch (e) {}

      document.getElementById('error-banner').hidden = true;
      setLoading(true, '位置情報を取得中…');

      try {
        const { lat, lng } = await getLocation();
        state.userLat = lat;
        state.userLng = lng;

        setLoading(true, '図書館を検索中…');
        const libraries = await fetchLibraries(appkey, lat, lng);
        state.libraries = libraries;

        const mainEl = document.getElementById('main-content');
        mainEl.hidden = false;

        initMap(lat, lng);
        renderMarkers(libraries);
        renderCards(libraries);

        mainEl.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    }

    document.getElementById('search-btn').addEventListener('click', onSearch);
    document.getElementById('appkey-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') onSearch();
    });

    // Restore saved API key
    try {
      const saved = localStorage.getItem('calil_appkey');
      if (saved) document.getElementById('appkey-input').value = saved;
    } catch (e) {}
  </script>
</body>
</html>
